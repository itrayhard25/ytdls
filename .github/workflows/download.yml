name: Youtopia Download

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: 'لینک ویدیو'
        required: true
        type: string
      zip_password:
        description: 'رمز فایل'
        required: true
        type: string
      user_id:
        description: 'شناسه کاربر'
        required: true
        type: string
      worker_url:
        description: 'آدرس Worker یوتیوپیا'
        required: false
        default: 'https://ytdls.itray25.workers.dev'
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: اطلاع شروع به Worker
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-started" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\"}" || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full ffmpeg python3-pip

          # آخرین نسخه yt-dlp
          pip install -U "yt-dlp[default]" --quiet

          # نصب Deno برای JS runtime (حل bot detection)
          curl -fsSL https://deno.land/install.sh | sh 2>/dev/null || true
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

          echo "✅ ابزارها نصب شدند"
          yt-dlp --version

      - name: آماده‌سازی کوکی
        env:
          YOUTOPIA_COOKIES_B64: ${{ secrets.YOUTOPIA_COOKIES_B64 }}
        run: |
          if [ -n "$YOUTOPIA_COOKIES_B64" ]; then
            echo "$YOUTOPIA_COOKIES_B64" | base64 -d > /tmp/cookies.txt
            echo "HAS_COOKIES=1" >> $GITHUB_ENV
            echo "✅ کوکی بارگذاری شد"
          else
            echo "HAS_COOKIES=0" >> $GITHUB_ENV
            echo "⚠️ کوکی تنظیم نشده - بدون کوکی ادامه می‌دهیم"
          fi

      - name: بررسی و انتخاب بهترین کیفیت
        id: quality
        env:
          YT_URL: ${{ github.event.inputs.media_url }}
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          
          COOKIE_FLAG=""
          if [ "$HAS_COOKIES" = "1" ]; then
            COOKIE_FLAG="--cookies /tmp/cookies.txt"
          fi

          echo "🔍 بررسی فرمت‌های موجود..."

          # تلاش با client های مختلف برای bypass bot detection
          for CLIENT in "tv_simply" "ios" "android" "tv"; do
            echo "⚙️ تلاش با client: $CLIENT"
            
            FORMAT_CHECK=$(yt-dlp \
              --extractor-args "youtube:player_client=${CLIENT}" \
              $COOKIE_FLAG \
              --list-formats \
              --no-warnings \
              "$YT_URL" 2>&1 | head -5)
            
            if ! echo "$FORMAT_CHECK" | grep -qi "sign in\|bot\|error\|unavailable"; then
              echo "✅ client کار می‌کند: $CLIENT"
              echo "WORKING_CLIENT=$CLIENT" >> $GITHUB_ENV
              break
            fi
            echo "❌ client $CLIENT کار نمی‌کند"
          done

          if [ -z "$WORKING_CLIENT" ]; then
            echo "WORKING_CLIENT=tv_simply" >> $GITHUB_ENV
            echo "⚠️ هیچ client ای تایید نشد، از tv_simply استفاده می‌کنیم"
          fi

          # بررسی کیفیت مناسب (حداکثر 720p)
          for QUALITY in 720 480 360 240; do
            echo "📏 بررسی حجم ${QUALITY}p..."
            
            SIZE=$(yt-dlp \
              --extractor-args "youtube:player_client=${WORKING_CLIENT}" \
              $COOKIE_FLAG \
              --format "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" \
              --print "%(filesize,filesize_approx)s" \
              --no-warnings \
              "$YT_URL" 2>/dev/null | head -1 | tr -d '[:space:]')

            if [ -z "$SIZE" ] || [ "$SIZE" = "NA" ] || [ "$SIZE" = "None" ]; then
              SIZE=0
            fi

            # حداکثر 1.8 گیگابایت (برای 7zip بعد از فشرده‌سازی)
            MAX_BYTES=1932735283

            if [ "$SIZE" -eq 0 ] || [ "$SIZE" -le "$MAX_BYTES" ] 2>/dev/null; then
              echo "✅ کیفیت ${QUALITY}p انتخاب شد"
              echo "SELECTED_QUALITY=$QUALITY" >> $GITHUB_ENV
              break
            fi
            echo "⚠️ ${QUALITY}p حجمش زیاده ($SIZE بایت)"
          done

          if [ -z "$SELECTED_QUALITY" ]; then
            echo "SELECTED_QUALITY=360" >> $GITHUB_ENV
          fi

      - name: اطلاع پیشرفت - شروع دانلود
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"download\",\"percent\":10}" || true

      - name: دانلود ویدیو
        env:
          YT_URL: ${{ github.event.inputs.media_url }}
        run: |
          export PATH="$HOME/.deno/bin:$PATH"

          COOKIE_FLAG=""
          if [ "$HAS_COOKIES" = "1" ]; then
            COOKIE_FLAG="--cookies /tmp/cookies.txt"
          fi

          echo "🎬 دانلود با کیفیت ${SELECTED_QUALITY}p و client: ${WORKING_CLIENT}"

          # تلاش اول با client انتخاب‌شده
          yt-dlp \
            --extractor-args "youtube:player_client=${WORKING_CLIENT}" \
            $COOKIE_FLAG \
            --format "bestvideo[height<=${SELECTED_QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${SELECTED_QUALITY}][ext=mp4]/best[height<=${SELECTED_QUALITY}]" \
            --merge-output-format mp4 \
            --output "video.%(ext)s" \
            --no-playlist \
            --retries 5 \
            --fragment-retries 5 \
            --retry-sleep 5 \
            --no-warnings \
            "$YT_URL" || \
          (echo "⚠️ تلاش دوم با ios..." && \
          yt-dlp \
            --extractor-args "youtube:player_client=ios" \
            $COOKIE_FLAG \
            --format "best[height<=${SELECTED_QUALITY}]/best" \
            --output "video.%(ext)s" \
            --no-playlist \
            --retries 3 \
            "$YT_URL")

          VIDEO_FILE=$(ls video.* 2>/dev/null | head -1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "❌ فایل ویدیو یافت نشد!"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
          echo "✅ دانلود کامل: $VIDEO_FILE ($(( FILE_SIZE / 1024 / 1024 )) MB)"
          echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV

      - name: اطلاع پیشرفت - فشرده‌سازی
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"compress\",\"percent\":60}" || true

      - name: فشرده‌سازی با رمز
        run: |
          7z a \
            -p"${{ github.event.inputs.zip_password }}" \
            -mhe=on \
            -mx=1 \
            -v95m \
            "archive.7z" \
            "${{ env.VIDEO_FILE }}"

          ls -lh archive.7z* 2>/dev/null || ls -lh archive.7z
          echo "✅ فشرده‌سازی کامل شد"
          rm -f "${{ env.VIDEO_FILE }}"

      - name: پیکربندی git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: اطلاع پیشرفت - آپلود
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":70}" || true

      - name: ایجاد branch و آپلود
        id: upload
        run: |
          BRANCH_NAME="yt_${{ github.event.inputs.user_id }}_$(date +%s)"
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf . 2>/dev/null || true

          echo "# Youtopia download" > README.md

          # آپلود فایل‌ها
          CHUNKS=(archive.7z.*)
          if [ ${#CHUNKS[@]} -eq 0 ] || [ ! -f "${CHUNKS[0]}" ]; then
            CHUNKS=(archive.7z)
          fi
          TOTAL=${#CHUNKS[@]}

          BATCH=2
          START=0
          while [ $START -lt $TOTAL ]; do
            END=$((START + BATCH - 1))
            [ $END -ge $TOTAL ] && END=$((TOTAL - 1))

            for i in $(seq $START $END); do
              git add "${CHUNKS[$i]}" 2>/dev/null || true
            done
            git add README.md

            git commit -m "chunks $((START+1))-$((END+1))/$TOTAL"

            for attempt in {1..5}; do
              git push origin "$BRANCH_NAME" && break
              echo "تلاش $attempt ناموفق..."
              sleep 10
            done

            PERCENT=$((70 + (END + 1) * 28 / TOTAL))
            curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":$PERCENT}" || true

            START=$((END + 1))
            sleep 2
          done

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "✅ آپلود کامل شد: $BRANCH_NAME"

      - name: اطلاع موفقیت به Worker
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-complete" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"branch\":\"${{ env.BRANCH_NAME }}\",\"repo_info\":\"{\\\"owner\\\":\\\"${{ github.repository_owner }}\\\",\\\"repo\\\":\\\"${{ github.event.repository.name }}\\\"}\"}"

      - name: اطلاع خطا به Worker
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-failed" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"error\":\"Workflow failed\"}"
