name: YouTube Download for Youtopia

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      zip_password:
        description: 'رمز فایل فشرده'
        required: true
        type: string
      user_id:
        description: 'شناسه کاربر تلگرام'
        required: true
        type: string
      max_size_mb:
        description: 'حداکثر حجم فایل (مگابایت) برای انتخاب کیفیت'
        required: false
        default: '2048'
        type: string
      worker_url:
        description: 'آدرس Cloudflare Worker یوتیوپیا'
        required: false
        default: 'https://ytdls.itray25.workers.dev'
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      # 1. اعلان شروع کار به Worker
      - name: Notify Worker - Job Started
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-started" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\"}" || true

      # 2. دریافت سورس کد
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. نصب و راه‌اندازی خودکار yt-dlp با تمام ابزارهای مورد نیاز
      - name: Setup yt-dlp & FFmpeg & JS Runtime
        uses: AnimMouse/setup-yt-dlp@v3

      # 4. تنظیم و بارگذاری خودکار کوکی‌ها (در صورت وجود در Secrets)
      - name: Setup YouTube Cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      # 5. بررسی کیفیت مناسب بر اساس محدودیت حجم
      - name: Select Video Quality Based on Size Limit
        id: quality
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          MAX_SIZE_MB: ${{ github.event.inputs.max_size_mb }}
        run: |
          echo "🔍 در حال بررسی فرمت‌های موجود..."
          
          FORMAT_INFO=$(yt-dlp --list-formats "$YT_URL" 2>&1 || echo "ERROR")
          if echo "$FORMAT_INFO" | grep -q "ERROR"; then
            echo "❌ خطا در دریافت اطلاعات ویدیو. کیفیت 480p انتخاب شد."
            echo "selected_quality=480" >> $GITHUB_ENV
            exit 0
          fi
          
          MAX_BYTES=$((${MAX_SIZE_MB:-2048} * 1024 * 1024))
          
          for QUALITY in 720 480 360 240 144; do
            echo "⚙️ در حال بررسی کیفیت ${QUALITY}p..."
            SIZE_INFO=$(yt-dlp --format "bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]" \
              --print "%(filesize,filesize_approx)s" \
              "$YT_URL" 2>/dev/null || echo "0")
            
            FILE_SIZE=$(echo "$SIZE_INFO" | head -1 | tr -d '[:space:]')
            if [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "NA" ] || [ "$FILE_SIZE" = "None" ]; then
              FILE_SIZE=0
            fi
            
            echo "   حجم تخمینی ${QUALITY}p: $FILE_SIZE بایت"
            
            if [ "$FILE_SIZE" -eq 0 ] || [ "$FILE_SIZE" -le "$MAX_BYTES" ]; then
              echo "✅ کیفیت ${QUALITY}p انتخاب شد (حجم: $FILE_SIZE بایت)"
              echo "selected_quality=$QUALITY" >> $GITHUB_ENV
              break
            fi
          done
          
          if [ -z "${{ env.selected_quality }}" ]; then
            echo "selected_quality=144" >> $GITHUB_ENV
          fi
        shell: bash

      # 6. دانلود ویدیو با بهترین فرمت صدا و تصویر
      - name: Download YouTube Video
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          SELECTED_QUALITY: ${{ env.selected_quality }}
        run: |
          echo "🎬 دانلود با کیفیت ${SELECTED_QUALITY}p..."
          
          yt-dlp \
            --format "bestvideo[height<=${SELECTED_QUALITY}]+bestaudio/best[height<=${SELECTED_QUALITY}]" \
            --merge-output-format mp4 \
            --output "video.%(ext)s" \
            --no-playlist \
            --retries 5 \
            --fragment-retries 5 \
            --retry-sleep 5 \
            "$YT_URL"
          
          VIDEO_FILE=$(ls video.* 2>/dev/null | head -1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "❌ فایل ویدیو یافت نشد!"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
          echo "✅ دانلود کامل شد: $VIDEO_FILE ($(( FILE_SIZE / 1024 / 1024 )) MB)"
          echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV
          echo "VIDEO_SIZE=$FILE_SIZE" >> $GITHUB_ENV
        shell: bash

      # 7. فشرده‌سازی فایل نهایی با رمز
      - name: Compress Video with Password
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=1 -v95m "archive.7z" "${{ env.VIDEO_FILE }}"
          echo "✅ فشرده‌سازی کامل شد"

      # 8. حذف فایل اصلی برای ذخیره‌سازی بهتر
      - name: Remove Original Video File
        run: rm -f "${{ env.VIDEO_FILE }}"

      # 9. پیکربندی Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 10. ایجاد یک شاخه‌ی جدید و آپلود قطعات فایل فشرده
      - name: Create Branch & Upload Chunks
        id: upload
        run: |
          BRANCH_NAME="yt_${{ github.event.inputs.user_id }}_$(date +%s)"
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf . 2>/dev/null || true
          
          echo "# YouTube Download for user ${{ github.event.inputs.user_id }}" > README.md
          
          chunks=(archive.7z.*)
          total=${#chunks[@]}
          
          if [ $total -eq 0 ]; then
            chunks=(archive.7z)
            total=1
          fi
          
          batch_size=2
          start=0
          
          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))
            for i in $(seq $start $end); do
              git add "${chunks[$i]}" 2>/dev/null || true
            done
            git add README.md
            git commit -m "Add chunks $((start+1))-$((end+1)) of $total"
            for attempt in {1..5}; do
              if git push origin "$BRANCH_NAME"; then
                echo "Push successful"
                break
              else
                echo "Attempt $attempt failed - retrying..."
                sleep 10
              fi
            done
            
            PERCENT=$((70 + (end + 1) * 30 / total))
            curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":$PERCENT}" || true
            
            start=$((end + 1))
            sleep 2
          done
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        shell: bash

      # 11. اطلاع‌رسانی موفقیت‌آمیز بودن عملیات به Worker
      - name: Notify Worker - Job Completed
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-complete" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"branch\":\"${{ env.BRANCH_NAME }}\",\"repo_info\":\"{\\\"owner\\\":\\\"${{ github.repository_owner }}\\\",\\\"repo\\\":\\\"${{ github.event.repository.name }}\\\"}\"}"

      # 12. اطلاع‌رسانی خطا در صورت شکست
      - name: Notify Worker - Job Failed
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-failed" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"error\":\"Workflow failed\"}"
