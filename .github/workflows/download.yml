name: Youtopia Download

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      zip_password:
        description: 'رمز فایل فشرده'
        required: true
        type: string
      user_id:
        description: 'شناسه کاربر تلگرام'
        required: true
        type: string
      desired_quality:
        description: 'کیفیت مورد نظر'
        required: false
        default: '720'
        type: choice
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      min_quality:
        description: 'حداقل کیفیت قابل قبول'
        required: false
        default: '480'
        type: choice
        options:
          - '720'
          - '480'
          - '360'
          - '240'
      max_size_mb:
        description: 'حداکثر حجم فایل (مگابایت)'
        required: false
        default: '2048'
        type: string
      worker_url:
        description: 'آدرس Cloudflare Worker یوتیوپیا'
        required: false
        default: 'https://ytdls.itray25.workers.dev'
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Notify Worker - Job Started
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-started" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\"}" || true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup yt-dlp & FFmpeg & JS Runtime
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Create cookies file from secret
        env:
          COOKIE_BASE64: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -z "$COOKIE_BASE64" ]; then
            echo "⚠️ هشدار: Secret مربوط به کوکی (YOUTUBE_COOKIES) تنظیم نشده!"
          else
            echo "$COOKIE_BASE64" | base64 -d > cookies.txt
            echo "✅ فایل کوکی ساخته شد"
          fi
        shell: bash

      - name: Select Final Quality (desired → min)
        id: quality
        env:
          YT_URL: ${{ github.event.inputs.media_url }}
          MAX_SIZE_MB: ${{ github.event.inputs.max_size_mb }}
          DESIRED_Q: ${{ github.event.inputs.desired_quality }}
          MIN_Q: ${{ github.event.inputs.min_quality }}
        run: |
          echo "🎯 کیفیت درخواستی: ${DESIRED_Q}p"
          echo "🔻 حداقل قابل قبول: ${MIN_Q}p"

          COOKIE_ARG=""
          [ -f cookies.txt ] && COOKIE_ARG="--cookies cookies.txt"

          MAX_BYTES=$((${MAX_SIZE_MB:-2048} * 1024 * 1024))

          QUALITIES=()
          for q in 2160 1440 1080 720 480 360 240 144; do
            if [ $q -le $DESIRED_Q ] && [ $q -ge $MIN_Q ]; then
              QUALITIES+=($q)
            fi
          done

          SELECTED=""
          for q in "${QUALITIES[@]}"; do
            echo "⚙️ بررسی کیفیت ${q}p ..."
            SIZE_INFO=$(yt-dlp $COOKIE_ARG \
              --format "bestvideo[height<=${q}]+bestaudio/best[height<=${q}]" \
              --print "%(filesize,filesize_approx)s" \
              "$YT_URL" 2>/dev/null || echo "0")

            FILE_SIZE=$(echo "$SIZE_INFO" | head -1 | tr -d '[:space:]')
            [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "NA" ] || [ "$FILE_SIZE" = "None" ] && FILE_SIZE=0

            echo "   حجم تخمینی: $FILE_SIZE بایت (حد مجاز: $MAX_BYTES بایت)"

            if [ "$FILE_SIZE" -eq 0 ] || [ "$FILE_SIZE" -le "$MAX_BYTES" ]; then
              echo "✅ کیفیت ${q}p انتخاب شد."
              SELECTED=$q
              break
            else
              echo "❌ حجم بیش از حد مجاز، رفتن به کیفیت پایین‌تر..."
            fi
          done

          if [ -z "$SELECTED" ]; then
            echo "⚠️ هیچ کیفیتی در بازه ${MIN_Q}p تا ${DESIRED_Q}p کمتر از حجم مجاز نبود."
            echo "برای جلوگیری از خطا، کیفیت ${MIN_Q}p رو دانلود می‌کنیم."
            SELECTED=$MIN_Q
          fi

          echo "selected_quality=$SELECTED" >> $GITHUB_ENV
        shell: bash

      - name: Notify Worker - Progress Download Start
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"download\",\"percent\":10}" || true

      - name: Download YouTube Video
        env:
          YT_URL: ${{ github.event.inputs.media_url }}
          SELECTED_QUALITY: ${{ env.selected_quality }}
        run: |
          echo "🎬 دانلود با کیفیت ${SELECTED_QUALITY}p..."

          COOKIE_ARG=""
          [ -f cookies.txt ] && COOKIE_ARG="--cookies cookies.txt"

          yt-dlp \
            $COOKIE_ARG \
            --format "bestvideo[height<=${SELECTED_QUALITY}]+bestaudio/best[height<=${SELECTED_QUALITY}]" \
            --merge-output-format mp4 \
            --output "video.%(ext)s" \
            --no-playlist \
            --retries 5 \
            --fragment-retries 5 \
            --retry-sleep 5 \
            "$YT_URL"

          VIDEO_FILE=$(ls video.* 2>/dev/null | head -1)
          [ -z "$VIDEO_FILE" ] && { echo "❌ فایل ویدیو یافت نشد!"; exit 1; }

          FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
          echo "✅ دانلود کامل: $VIDEO_FILE ($(( FILE_SIZE / 1024 / 1024 )) MB)"
          echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV
        shell: bash

      - name: Notify Worker - Progress Compress
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"compress\",\"percent\":60}" || true

      - name: Compress Video with Password
        run: |
          7z a \
            -p"${{ github.event.inputs.zip_password }}" \
            -mhe=on \
            -mx=1 \
            -v95m \
            "archive.7z" \
            "${{ env.VIDEO_FILE }}"
          ls -lh archive.7z* 2>/dev/null || ls -lh archive.7z
          echo "✅ فشرده‌سازی کامل شد"
          rm -f "${{ env.VIDEO_FILE }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Notify Worker - Progress Upload Start
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":70}" || true

      - name: Create Branch & Upload Chunks
        id: upload
        run: |
          BRANCH_NAME="yt_${{ github.event.inputs.user_id }}_$(date +%s)"
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf . 2>/dev/null || true

          echo "# Youtopia download" > README.md

          chunks=(archive.7z.*)
          total=${#chunks[@]}
          [ $total -eq 0 ] && { chunks=(archive.7z); total=1; }

          batch_size=2
          start=0
          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))
            for i in $(seq $start $end); do
              git add "${chunks[$i]}" 2>/dev/null || true
            done
            git add README.md
            git commit -m "chunks $((start+1))-$((end+1))/$total"
            for attempt in {1..5}; do
              git push origin "$BRANCH_NAME" && break
              echo "تلاش $attempt ناموفق..."
              sleep 10
            done

            PERCENT=$((70 + (end + 1) * 28 / total))
            curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":$PERCENT}" || true

            start=$((end + 1))
            sleep 2
          done

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "✅ آپلود کامل شد: $BRANCH_NAME"
        shell: bash

      - name: Notify Worker - Job Completed
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-complete" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"branch\":\"${{ env.BRANCH_NAME }}\",\"repo_info\":\"{\\\"owner\\\":\\\"${{ github.repository_owner }}\\\",\\\"repo\\\":\\\"${{ github.event.repository.name }}\\\"}\"}"

      - name: Notify Worker - Job Failed
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-failed" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"error\":\"Workflow failed\"}"
