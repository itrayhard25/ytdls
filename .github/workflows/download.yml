name: YouTube Download for Youtopia

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      zip_password:
        description: 'رمز فایل فشرده'
        required: true
        type: string
      user_id:
        description: 'شناسه کاربر تلگرام'
        required: true
        type: string
      max_size_mb:
        description: 'حداکثر حجم فایل (مگابایت) برای انتخاب کیفیت'
        required: false
        default: '2048'
        type: string
      worker_url:
        description: 'آدرس Cloudflare Worker یوتیوپیا'
        required: false
        default: 'https://ytdls.itray25.workers.dev'
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Worker - شروع کار
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-started" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\"}" || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- نصب ابزارها و سرور PO Token ---
      - name: نصب yt-dlp، Node.js و راه‌اندازی سرور PO Token
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          python3 -m pip install -U --pre "yt-dlp[default]"
          git clone https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
          cd bgutil-ytdlp-pot-provider/server/
          npm ci
          npx tsc
          node build/server.js &
          sleep 5
          if curl -s --max-time 5 http://localhost:4416; then
            echo "✅ سرور PO Token فعال است"
            echo "PO_SERVER_READY=true" >> $GITHUB_ENV
          else
            echo "⚠️ سرور PO Token آماده نشد - استفاده از android_vr"
            echo "PO_SERVER_READY=false" >> $GITHUB_ENV
          fi
        shell: bash

      # --- ایجاد فایل کوکی ---
      - name: ایجاد فایل کوکی
        env:
          COOKIE_BASE64: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -z "$COOKIE_BASE64" ]; then
            echo "⚠️ کوکی تنظیم نشده"
          else
            echo "$COOKIE_BASE64" | base64 -d > cookies.txt
            echo "✅ فایل کوکی ساخته شد"
          fi
        shell: bash

      - name: بررسی کیفیت بر اساس حجم
        id: quality
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          MAX_SIZE_MB: ${{ github.event.inputs.max_size_mb }}
          PO_SERVER_READY: ${{ env.PO_SERVER_READY }}
        run: |
          echo "🔍 بررسی فرمت‌های موجود..."
          COOKIE_ARG=""
          [ -f cookies.txt ] && COOKIE_ARG="--cookies cookies.txt"
          
          if [ "$PO_SERVER_READY" = "true" ]; then
            POT_ARG='--extractor-args "youtube:pot-provider=bgutil:http"'
          else
            POT_ARG='--extractor-args "youtube:player_client=android_vr"'
          fi
          
          FORMAT_INFO=$(yt-dlp $COOKIE_ARG $POT_ARG --js-runtimes node --remote-components ejs:npm --list-formats "$YT_URL" 2>&1 || echo "ERROR")
          if echo "$FORMAT_INFO" | grep -q "ERROR"; then
            echo "❌ خطا در دریافت اطلاعات ویدیو"
            echo "selected_quality=480" >> $GITHUB_ENV
            exit 0
          fi
          
          MAX_BYTES=$((${MAX_SIZE_MB:-2048} * 1024 * 1024))
          for QUALITY in 720 480 360 240 144; do
            echo "⚙️ بررسی کیفیت ${QUALITY}p..."
            SIZE_INFO=$(yt-dlp $COOKIE_ARG $POT_ARG --js-runtimes node --remote-components ejs:npm \
              --format "bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]" \
              --print "%(filesize,filesize_approx)s" \
              "$YT_URL" 2>/dev/null || echo "0")
            FILE_SIZE=$(echo "$SIZE_INFO" | head -1 | tr -d '[:space:]')
            [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "NA" ] || [ "$FILE_SIZE" = "None" ] && FILE_SIZE=0
            echo "   حجم تخمینی ${QUALITY}p: $FILE_SIZE بایت"
            if [ "$FILE_SIZE" -eq 0 ] || [ "$FILE_SIZE" -le "$MAX_BYTES" ]; then
              echo "✅ کیفیت ${QUALITY}p انتخاب شد"
              echo "selected_quality=$QUALITY" >> $GITHUB_ENV
              break
            fi
          done
          [ -z "${{ env.selected_quality }}" ] && echo "selected_quality=144" >> $GITHUB_ENV
        shell: bash

      - name: Notify Worker - شروع دانلود
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"download\",\"percent\":0}" || true

      - name: دانلود ویدیوی یوتیوب
        env:
          YT_URL: ${{ github.event.inputs.youtube_url }}
          SELECTED_QUALITY: ${{ env.selected_quality }}
          PO_SERVER_READY: ${{ env.PO_SERVER_READY }}
        run: |
          echo "🎬 دانلود با کیفیت ${SELECTED_QUALITY}p..."
          COOKIE_ARG=""
          [ -f cookies.txt ] && COOKIE_ARG="--cookies cookies.txt"
          
          if [ "$PO_SERVER_READY" = "true" ]; then
            POT_ARG='--extractor-args "youtube:pot-provider=bgutil:http"'
          else
            POT_ARG='--extractor-args "youtube:player_client=android_vr"'
          fi
          
          yt-dlp \
            $COOKIE_ARG \
            $POT_ARG \
            --js-runtimes node \
            --remote-components ejs:npm \
            --format "bestvideo[height<=${SELECTED_QUALITY}]+bestaudio/best[height<=${SELECTED_QUALITY}]" \
            --merge-output-format mp4 \
            --output "video.%(ext)s" \
            --no-playlist \
            --restrict-filenames \
            --retries 5 \
            --fragment-retries 5 \
            --retry-sleep 5 \
            "$YT_URL"
          
          VIDEO_FILE=$(ls video.* 2>/dev/null | head -1)
          [ -z "$VIDEO_FILE" ] && { echo "❌ فایل ویدیو یافت نشد!"; exit 1; }
          FILE_SIZE=$(stat -c%s "$VIDEO_FILE")
          echo "✅ دانلود کامل شد: $VIDEO_FILE ($(( FILE_SIZE / 1024 / 1024 )) MB)"
          echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV
        shell: bash

      # --- مراحل فشرده‌سازی، آپلود و اطلاع‌رسانی (بدون تغییر) ---
      - name: Notify Worker - شروع فشرده‌سازی
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"compress\",\"percent\":50}" || true

      - name: فشرده‌سازی با رمز
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=1 -v95m "archive.7z" "${{ env.VIDEO_FILE }}"
          echo "✅ فشرده‌سازی کامل شد"

      - name: حذف فایل اصلی
        run: rm -f "${{ env.VIDEO_FILE }}"

      - name: پیکربندی git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Notify Worker - شروع آپلود
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":70}" || true

      - name: ایجاد branch و آپلود
        id: upload
        run: |
          BRANCH_NAME="yt_${{ github.event.inputs.user_id }}_$(date +%s)"
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf . 2>/dev/null || true
          echo "# YouTube Download for user ${{ github.event.inputs.user_id }}" > README.md
          chunks=(archive.7z.*)
          total=${#chunks[@]}
          [ $total -eq 0 ] && chunks=(archive.7z) && total=1
          batch_size=2
          start=0
          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))
            for i in $(seq $start $end); do
              git add "${chunks[$i]}" 2>/dev/null || true
            done
            git add README.md
            git commit -m "Add chunks $((start+1))-$((end+1)) of $total"
            for attempt in {1..5}; do
              if git push origin "$BRANCH_NAME"; then
                echo "Push موفق"
                break
              else
                echo "تلاش $attempt ناموفق - انتظار..."
                sleep 10
              fi
            done
            PERCENT=$((70 + (end + 1) * 30 / total))
            curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-progress" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":$PERCENT}" || true
            start=$((end + 1))
            sleep 2
          done
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: اطلاع‌رسانی موفقیت به Worker
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-complete" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"branch\":\"${{ env.BRANCH_NAME }}\",\"repo_info\":\"{\\\"owner\\\":\\\"${{ github.repository_owner }}\\\",\\\"repo\\\":\\\"${{ github.event.repository.name }}\\\"}\"}"

      - name: اطلاع‌رسانی خطا به Worker
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/yt-failed" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"error\":\"Workflow failed\"}"
